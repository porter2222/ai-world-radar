      --surface: oklch(0.975 0.004 145);
      --panel: oklch(0.95 0.006 145);
      --ink: oklch(0.18 0.012 245);
      --ink-soft: oklch(0.29 0.014 245);
      --muted: oklch(0.43 0.016 245);
      --faint: oklch(0.63 0.014 245);
      --line: oklch(0.88 0.006 245);
      --line-strong: oklch(0.80 0.008 245);
      --primary: oklch(0.36 0.052 145);
      --primary-soft: oklch(0.93 0.020 145);
      --accent: oklch(0.42 0.055 230);
      --radius: 8px;
      --header-h: 64px;
      --max: 1120px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-width: 1180px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 15.5px;
      line-height: 1.6;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body::selection {
      background: var(--primary-soft);
      color: var(--ink);
    }

    a, button { font: inherit; }
    a { color: inherit; text-decoration: none; }
    button { appearance: none; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklch, var(--paper) 92%, var(--bg));
    }

    .topbar-inner {
      width: min(var(--max), calc(100% - 56px));
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 27px;
      height: 27px;
      border: 1px solid color-mix(in oklch, var(--ink) 72%, var(--line));
      border-radius: 50%;
      display: inline-block;
      color: transparent;
      font-size: 0;
      line-height: 0;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid color-mix(in oklch, var(--primary) 72%, var(--ink));
      border-radius: 50%;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 720;
      white-space: nowrap;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .top-meta span + span::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 3px;
      margin: 0 10px 2px 0;
      border-radius: 50%;
      background: var(--line-strong);
    }

    .shell {
      width: min(var(--max), calc(100% - 56px));
      margin: 0 auto;
      padding: 34px 0 72px;
    }

    .view { display: none; }
    .view.is-active { display: block; }

    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 48px;
      padding-bottom: 26px;
      border-bottom: 1px solid var(--line);
    }

    .page-kicker {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .page-title {
      margin: 0;
      max-width: 15em;
      color: var(--ink);
      font-size: 36px;
      line-height: 1.18;
      font-weight: 720;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .page-note {
      margin: 0;
      max-width: 30em;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: right;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin: 18px 0 10px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.4;
    }

    .section-label strong {
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .event-card {
      width: 100%;
      border: 1px solid transparent;
      border-bottom-color: var(--line);
      border-radius: var(--radius);
      padding: 14px 14px 14px 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 132px;
      gap: 18px;
      align-items: start;
      text-align: left;
      cursor: pointer;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease;
    }

    .event-card:hover {
      background: color-mix(in oklch, var(--paper) 72%, var(--surface));
      border-color: color-mix(in oklch, var(--line) 78%, var(--primary-soft));
    }

    .event-card.is-active {
      background: var(--paper);
      border-color: var(--line-strong);
    }

    .event-card:focus-visible {
      outline: 3px solid color-mix(in oklch, var(--primary) 30%, transparent);
      outline-offset: 2px;
    }

    .cover {
      position: relative;
      overflow: hidden;
      min-height: 94px;
      aspect-ratio: 16 / 10;
      border-radius: 6px;
      background: var(--panel);
      isolation: isolate;
    }

    .cover img {
      width: 100%;
      height: 100%;
      min-height: 94px;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .cover.fit-contain img {
      object-fit: contain;
      background: var(--paper);
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid color-mix(in oklch, var(--ink) 10%, transparent);
      border-radius: inherit;
      pointer-events: none;
    }

    .cover-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: end;
      padding: 12px;
      background: var(--panel);
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 680;
    }

    .cover.is-fallback img { display: none; }
    .cover.is-fallback .cover-fallback { display: flex; }

    .card-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-top: 1px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
    }

    .signal-word {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .time {
      color: var(--faint);
      font-size: 12px;
      white-space: nowrap;
    }

    .card-title {
      margin: 0;
      color: var(--ink);
      max-width: 38em;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 680;
      letter-spacing: 0;
      text-wrap: pretty;
    }

    .event-card:hover .card-title,
    .event-card.is-active .card-title {
      color: var(--primary);
    }

    .card-summary {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.58;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-side {
      min-width: 0;
      padding-top: 3px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
      text-align: right;
    }

    .card-side strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.4;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;

      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-weight: 660;
      transition: color 150ms ease;

    .back-link:hover,

      color: var(--primary);
      outline: 0;
    }

    .detail-updated {
      color: var(--faint);
      white-space: nowrap;
    }

    .dossier {
      width: min(820px, 100%);
      margin: 0 auto;
      padding-bottom: 18px;

    .dossier-headline {

    }

      color: var(--ink);
      font-size: 24px;
      line-height: 1.34;
      font-weight: 720;

      font-size: 15px;
      line-height: 1.76;

    .note-title {

      font-size: 13px;
      line-height: 1.4;
      font-weight: 720;
    }

      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.72;
    }

    .article-body p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.86;
      text-wrap: pretty;
    }

    .dossier-tail {
      display: grid;
      gap: 20px;
      margin-top: 22px;
    }

    .note-box {
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

      padding: 0;

      display: grid;
      gap: 8px;

      color: var(--muted);
      font-size: 14px;
      line-height: 1.62;

      height: 4px;
      margin-top: 10px;
      border-radius: 50%;

      display: grid;
      gap: 2px;
      padding: 9px 0 10px;
      border-bottom: 1px solid var(--line);

    .source-list a:hover,

    .source-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 660;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    .dossier-footer {
      margin-top: 18px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (prefers-reduced-motion: reduce) {

      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
      }

  </style>

    const homeView = document.getElementById("homeView");
    const detailView = document.getElementById("detailView");
    const eventList = document.getElementById("eventList");
    const topEventCount = document.getElementById("topEventCount");
    const pageNote = document.getElementById("pageNote");
    const detailNavUpdated = document.getElementById("detailNavUpdated");
    const dossierCover = document.getElementById("dossierCover");
    const dossierImage = document.getElementById("dossierImage");
    const dossierFallback = document.getElementById("dossierFallback");
    const dossierMeta = document.getElementById("dossierMeta");
    const dossierTitle = document.getElementById("dossierTitle");
    const dossierSummary = document.getElementById("dossierSummary");
    const whyText = document.getElementById("whyText");
    const dossierBody = document.getElementById("dossierBody");
    const followList = document.getElementById("followList");
    const sourceList = document.getElementById("sourceList");
    const dossierFooter = document.getElementById("dossierFooter");

    function pill(text) {
      const span = document.createElement("span");
      span.className = "pill";
      span.textContent = text;
      return span;
    }

    function setView(hash) {
      const slug = decodeURIComponent((hash || "").replace("#", ""));
      const event = events.find((item) => item.slug === slug) || events[0];
      const onHome = !slug || slug === "home" || slug === "feed";

      homeView.classList.toggle("is-active", onHome);
      detailView.classList.toggle("is-active", !onHome);
      document.title = onHome ? "AI World Radar 高保真原型" : `${event.title} - AI World Radar`;

      if (onHome) {
        topEventCount.textContent = `${events.length} 个事件`;
        pageNote.textContent = "2026.06.23 · 5 个事件 · 最近更新 10:40";
        renderCards(null);
        return;
      }

      renderCards(event.slug);
      renderDetail(event);
    }

    function renderCards(selectedSlug) {
      eventList.innerHTML = "";

      events.forEach((event) => {
        const card = document.createElement("button");
        card.className = `event-card${event.slug === selectedSlug ? " is-active" : ""}`;
        card.type = "button";
        card.setAttribute("aria-label", `查看事件档案：${event.title}`);
        card.setAttribute("aria-pressed", event.slug === selectedSlug ? "true" : "false");

        const cover = document.createElement("div");
        cover.className = `cover${event.fit === "contain" ? " fit-contain" : ""}`;
        const img = document.createElement("img");
        img.src = event.image;
        img.alt = `${event.title} 封面图`;
        img.loading = "lazy";
        img.addEventListener("error", () => cover.classList.add("is-fallback"), { once: true });
        const fallback = document.createElement("div");
        fallback.className = "cover-fallback";
        fallback.textContent = event.category;
        cover.append(img, fallback);

        const body = document.createElement("div");
        body.className = "card-body";
        const meta = document.createElement("div");
        meta.className = "meta-row";
        meta.append(pill(event.category));
        const signal = document.createElement("span");
        signal.className = "signal-word";
        signal.textContent = event.signal;
        meta.append(signal);

        const title = document.createElement("h2");
        title.className = "card-title";
        title.textContent = event.title;
        const summary = document.createElement("p");
        summary.className = "card-summary";
        summary.textContent = event.cardSummary;
        body.append(meta, title, summary);

        const side = document.createElement("div");
        side.className = "card-side";
        const source = document.createElement("strong");
        source.textContent = event.sourceHint;
        const time = document.createElement("span");
        time.className = "time";
        time.textContent = event.time;
        side.append(source, time);

        card.append(cover, body, side);
        card.addEventListener("click", () => {
          if (location.hash.replace("#", "") !== event.slug) {
            history.pushState(null, "", `#${event.slug}`);
          }
          setView(`#${event.slug}`);
          window.scrollTo({ top: 0, behavior: "auto" });
        });
        eventList.append(card);
      });
    }

    function renderDetail(event) {
      detailNavUpdated.textContent = event.updated;
      dossierCover.className = `cover dossier-cover${event.fit === "contain" ? " fit-contain" : ""}`;
      dossierImage.src = event.image;
      dossierImage.alt = `${event.title} 封面图`;
      dossierImage.onerror = () => {
        dossierFallback.textContent = event.category;
        dossierCover.classList.add("is-fallback");
      };
      dossierFallback.textContent = event.category;

      dossierMeta.innerHTML = "";
      dossierMeta.append(pill(event.category));
      const signal = document.createElement("span");
      signal.className = "signal-word";
      signal.textContent = event.signal;
      const time = document.createElement("span");
      time.className = "time";
      time.textContent = `${event.time} · ${event.sourceHint}`;
      dossierMeta.append(signal, time);

      dossierTitle.textContent = event.title;
      dossierSummary.textContent = event.detailSummary;
      whyText.textContent = event.why;

      dossierBody.innerHTML = "";
      event.body.forEach((paragraph) => {
        const p = document.createElement("p");
        p.textContent = paragraph;
        dossierBody.append(p);
      });

      followList.innerHTML = "";
      event.follow.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        followList.append(li);
      });

      sourceList.innerHTML = "";
      event.sources.forEach(([name, url]) => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.rel = "noreferrer";
        const label = document.createElement("span");
        label.className = "source-name";
        label.textContent = name;
        const domain = document.createElement("span");
        domain.className = "source-domain";
        domain.textContent = url.replace(/^https?:\/\//, "");
        link.append(label, domain);
        li.append(link);
        sourceList.append(li);
      });

      dossierFooter.textContent = event.updated;
    }

    window.addEventListener("hashchange", () => setView(location.hash));
    window.addEventListener("popstate", () => setView(location.hash));

    setView(location.hash || "#home");
  </script>
