<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI World Radar</title>
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(1 0 0);
      --surface: oklch(0.988 0.002 245);
      --panel: oklch(0.955 0.003 245);
      --ink: oklch(0.19 0.014 245);
      --muted: oklch(0.45 0.018 245);
      --faint: oklch(0.66 0.014 245);
      --line: oklch(0.90 0.006 245);
      --primary: oklch(0.38 0.055 120);
      --primary-soft: oklch(0.94 0.018 120);
      --accent: oklch(0.52 0.09 230);
      --accent-soft: oklch(0.94 0.022 230);
      --radius: 8px;
      --header-h: 64px;
      --max: 1080px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 1120px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.65;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body::selection {
      background: var(--primary-soft);
      color: var(--ink);
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--header-h);
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }

    .topbar-inner {
      width: min(var(--max), calc(100% - 40px));
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 26px;
      height: 26px;
      border: 1px solid color-mix(in oklch, var(--ink) 72%, var(--line));
      border-radius: 50%;
      display: inline-block;
      color: transparent;
      font-size: 0;
      line-height: 0;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid color-mix(in oklch, var(--primary) 70%, var(--ink));
      border-radius: 50%;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 720;
      white-space: nowrap;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .top-meta strong {
      color: var(--ink);
      font-weight: 640;
    }

    .shell {
      width: min(var(--max), calc(100% - 72px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .portal-hero {
      display: block;
      padding: 12px 0 30px;
      margin-bottom: 0;
      border-bottom: 1px solid var(--line);
    }

    .portal-title {
      margin: 0;
      max-width: 13em;
      color: var(--ink);
      font-size: 46px;
      line-height: 1.14;
      font-weight: 720;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .portal-index {
      margin: 0;
      padding-top: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .event-list {
      display: grid;
      gap: 0;
    }

    .event-card {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      padding: 18px 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 204px minmax(0, 1fr) 148px;
      gap: 24px;
      align-items: start;
      text-align: left;
      cursor: pointer;
      transition: color 150ms ease, background-color 150ms ease;
    }

    .event-card:hover {
      background: linear-gradient(90deg, transparent, var(--surface) 8%, var(--surface) 92%, transparent);
    }

    .event-card:hover .card-title {
      color: var(--primary);
    }

    .event-card:focus-visible {
      outline: 3px solid color-mix(in oklch, var(--primary) 32%, transparent);
      outline-offset: 2px;
    }

    .cover {
      position: relative;
      overflow: hidden;
      min-height: 124px;
      aspect-ratio: 16 / 10;
      border-radius: 5px;
      background: var(--panel);
      isolation: isolate;
    }

    .cover img {
      width: 100%;
      height: 100%;
      min-height: 124px;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .cover.fit-contain img {
      object-fit: contain;
      background: var(--surface);
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid color-mix(in oklch, var(--ink) 10%, transparent);
      border-radius: inherit;
      pointer-events: none;
    }

    .cover-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: end;
      padding: 12px;
      background:
        linear-gradient(135deg, color-mix(in oklch, var(--panel) 72%, var(--primary-soft)), var(--surface));
      color: var(--ink);
      font-size: 12px;
      font-weight: 680;
    }

    .cover.is-fallback img {
      display: none;
    }

    .cover.is-fallback .cover-fallback {
      display: flex;
    }

    .card-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: auto;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.35;
      white-space: nowrap;
    }

    .pill.signal {
      background: transparent;
      color: var(--primary);
    }

    .time {
      color: var(--faint);
      font-size: 12px;
      white-space: nowrap;
    }

    .card-title {
      margin: 0;
      color: var(--ink);
      max-width: 38em;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 660;
      letter-spacing: 0;
    }

    .card-summary {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.62;
      max-width: 64ch;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-side {
      min-width: 0;
      padding-top: 5px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
      text-align: right;
    }

    .card-side strong {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      font-weight: 560;
    }

    .card-side span {
      display: block;
    }

    .dossier-pane {
      width: min(760px, 100%);
      margin: 0 auto;
      background: var(--bg);
    }

    .dossier {
      padding: 0 0 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--primary);
      outline: 0;
    }

    .detail-cover {
      min-height: 280px;
      aspect-ratio: 16 / 7.5;
      margin-bottom: 24px;
    }

    .detail-cover img {
      min-height: 280px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 12px;
    }

    .detail-title {
      margin: 0;
      max-width: 17em;
      font-size: 32px;
      line-height: 1.34;
      font-weight: 720;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .detail-summary {
      margin: 15px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.78;
      text-wrap: pretty;
    }

    .article-body {
      margin-top: 28px;
      padding-top: 26px;
      border-top: 1px solid var(--line);
      color: color-mix(in oklch, var(--ink) 91%, var(--muted));
    }

    .article-body p {
      margin: 0 0 19px;
      max-width: 66ch;
      font-size: 16px;
      line-height: 1.92;
      text-wrap: pretty;
    }

    .note-box {
      margin-top: 28px;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .note-title {
      margin: 0 0 9px;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 680;
    }

    .note-box p {
      margin: 0;
      max-width: 66ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.76;
    }

    .follow-list,
    .source-list {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
      display: grid;
      gap: 9px;
    }

    .follow-list li {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 9px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.62;
    }

    .follow-list li::before {
      content: "";
      width: 4px;
      height: 4px;
      margin-top: 10px;
      border-radius: 50%;
      background: var(--primary);
    }

    .source-list a {
      display: grid;
      gap: 2px;
      padding: 9px 0 10px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      transition: color 150ms ease;
    }

    .source-list a:hover {
      color: var(--accent);
    }

    .source-list a:focus-visible {
      outline: 3px solid color-mix(in oklch, var(--accent) 28%, transparent);
      outline-offset: 2px;
    }

    .source-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .source-domain {
      color: var(--faint);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--faint);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

    const homeView = document.getElementById("homeView");
    const detailView = document.getElementById("detailView");
    const eventList = document.getElementById("eventList");
    const detailImage = document.getElementById("detailImage");
    const detailCover = document.getElementById("detailCover");
    const detailFallback = document.getElementById("detailFallback");
    const detailMeta = document.getElementById("detailMeta");
    const detailTitle = document.getElementById("detailTitle");
    const detailSummary = document.getElementById("detailSummary");
    const detailBody = document.getElementById("detailBody");
    const whyText = document.getElementById("whyText");
    const followList = document.getElementById("followList");
    const sourceList = document.getElementById("sourceList");
    const detailFooter = document.getElementById("detailFooter");

    function pill(text, tone = "primary") {
      const span = document.createElement("span");
      span.className = `pill ${tone === "primary" ? "" : tone}`.trim();
      span.textContent = text;
      return span;
    }

    function renderCards() {
      eventList.innerHTML = "";

      events.forEach((event) => {
        const card = document.createElement("button");
        card.className = "event-card";
        card.type = "button";
        card.dataset.slug = event.slug;
        card.setAttribute("aria-label", `打开事件详情：${event.title}`);

        const cover = document.createElement("div");
        cover.className = "cover";
        if (event.fit === "contain") {
          cover.classList.add("fit-contain");
        }
        const img = document.createElement("img");
        img.src = event.image;
        img.alt = `${event.title} 封面图`;
        img.loading = "lazy";
        img.addEventListener("error", () => cover.classList.add("is-fallback"), { once: true });
        const fallback = document.createElement("div");
        fallback.className = "cover-fallback";
        fallback.textContent = event.category;
        cover.append(img, fallback);

        const body = document.createElement("div");
        body.className = "card-body";

        const meta = document.createElement("div");
        meta.className = "meta-row";
        meta.append(pill(event.category));

        const title = document.createElement("h2");
        title.className = "card-title";
        title.textContent = event.title;

        const summary = document.createElement("p");
        summary.className = "card-summary";
        summary.textContent = event.cardSummary;

        const side = document.createElement("div");
        side.className = "card-side";
        const source = document.createElement("strong");
        source.textContent = event.sourceHint;
        const time = document.createElement("span");
        time.textContent = event.time;
        side.append(source, time);

        body.append(meta, title, summary);
        card.append(cover, body, side);
        card.addEventListener("click", () => {
          location.hash = event.slug;
        });
        eventList.append(card);
      });
    }

    function renderDetail(event) {
      detailCover.classList.remove("is-fallback");
      detailCover.classList.toggle("fit-contain", event.fit === "contain");
      detailImage.src = event.image;
      detailImage.alt = `${event.title} 封面图`;
      detailImage.onerror = () => {
        detailFallback.textContent = event.category;
        detailCover.classList.add("is-fallback");
      };
      detailFallback.textContent = event.category;

      detailMeta.innerHTML = "";
      detailMeta.append(pill(event.category));
      const time = document.createElement("span");
      time.className = "time";
      time.textContent = `${event.time} · ${event.sourceHint}`;
      detailMeta.append(time);

      detailTitle.textContent = event.title;
      detailSummary.textContent = event.detailSummary;

      detailBody.innerHTML = "";
      event.body.forEach((paragraph) => {
        const p = document.createElement("p");
        p.textContent = paragraph;
        detailBody.append(p);
      });

      whyText.textContent = event.why;

      followList.innerHTML = "";
      event.follow.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        followList.append(li);
      });

      sourceList.innerHTML = "";
      event.sources.forEach(([name, url]) => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.rel = "noreferrer";
        const label = document.createElement("span");
        label.className = "source-name";
        label.textContent = name;
        const domain = document.createElement("span");
        domain.className = "source-domain";
        domain.textContent = url.replace(/^https?:\/\//, "");
        link.append(label, domain);
        li.append(link);
        sourceList.append(li);
      });

      detailFooter.textContent = event.updated;
    }

    function showHome() {
      document.title = "AI World Radar";
      homeView.classList.add("is-active");
      detailView.classList.remove("is-active");
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function showDetail(event) {
      renderDetail(event);
      document.title = `${event.title} - AI World Radar`;
      homeView.classList.remove("is-active");
      detailView.classList.add("is-active");
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function route() {
      const slug = decodeURIComponent(location.hash.replace("#", ""));
      if (!slug || slug === "home" || slug === "feed") {
        showHome();
        return;
      }

      const event = events.find((item) => item.slug === slug);
      if (!event) {
        showHome();
        return;
      }

      showDetail(event);
    }

    window.addEventListener("hashchange", route);

    renderCards();
    route();
  </script>
